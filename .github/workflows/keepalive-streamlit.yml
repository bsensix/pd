name: Keep Streamlit Alive

on:
  schedule:
    # Roda a cada 1 hora (UTC). O script só commita se já passou 11h.
    - cron: "0 * * * *"
  workflow_dispatch: # permite rodar manualmente

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create commit only if last commit >= 11h
        run: |
          LAST_COMMIT_EPOCH=$(git log -1 --format=%ct)
          NOW_EPOCH=$(date +%s)
          DIFF_HOURS=$(( (NOW_EPOCH - LAST_COMMIT_EPOCH) / 3600 ))

          echo "Último commit há ${DIFF_HOURS}h"

          if [ "$DIFF_HOURS" -ge 11 ]; then
            mkdir -p .github
            echo "heartbeat $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/heartbeat.txt
            git add .github/heartbeat.txt
            git commit -m "chore: keep streamlit alive [skip ci]" || echo "Sem mudanças para commit"
            git push
          else
            echo "Ainda não completou 11h. Sem commit."
          fi
